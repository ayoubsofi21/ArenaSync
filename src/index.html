<!doctype html>
<html>
  <head>
    <title>Counter Sans React</title>
  </head>
  <body>
    <h1 id="count">0</h1>
    <button onclick="increment()">Increment</button>

    <script>
      let count = 0;

      function increment() {
        count++;

        const counterElement = document.getElementById("count");

        counterElement.textContent = count;
      }
    </script>
  </body>
</html>
